[keys]
play_pause       = "space+z"
tempo_reset      = ["space+f", "space+v"]
quit             = "esc"
jump_forward_1   = "1"
jump_backward_1  = "q"
jump_forward_4   = "2"
jump_backward_4  = "w"
jump_forward_16  = "3"
jump_backward_16 = "e"
jump_forward_64  = "4"
jump_backward_64 = "r"
nudge_backward   = "c"
nudge_forward    = "d"
nudge_mode_toggle = ["C", "D"]
offset_increase  = ["=", "+"]
offset_decrease  = "-"
zoom_in          = "Z"
zoom_out         = "z"
height_increase  = "}"
height_decrease  = "{"
level_up         = "up"
level_down       = "down"
bpm_halve        = "h"
bpm_double       = "H"
bpm_increase     = "f"
bpm_decrease     = "v"
base_bpm_increase = "F"
base_bpm_decrease = "V"
bpm_redetect     = "t"
palette_cycle    = "p"
waveform_style   = "o"
open_browser     = "space+a"
bpm_tap          = "b"
calibration_toggle = "~"
filter_increase  = "]"
filter_decrease  = "["
filter_reset     = ["space+[", "space+]"]
help             = "?"

[display]
playhead_position = 20        # 0–100, percentage from left edge of detail panel
warning_threshold_secs = 30   # seconds before end to activate bar-marker flash warning
