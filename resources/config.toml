[keys]
quit             = "esc"

# Global
zoom_in          = "-"
zoom_out         = "="
height_increase  = "}"
height_decrease  = "{"
latency_decrease = "["
latency_increase = "]"
waveform_style   = "O"
palette_cycle    = "P"
terminal_refresh = "`"
help             = "?"
nudge_mode_toggle = "|"

# Deck 1
deck1_play_pause        = "space+z"
deck1_open_browser      = "Z"
deck1_bpm_tap           = "b"
deck1_metronome         = "B"
deck1_redetect_bpm      = "'"
deck1_tempo_reset       = "@"
deck1_bpm_increase      = "x"
deck1_bpm_decrease      = "s"
deck1_base_bpm_increase = "X"
deck1_base_bpm_decrease = "S"
deck1_nudge_forward     = "a"
deck1_nudge_backward    = "z"
deck1_offset_increase   = "!"
deck1_offset_decrease   = "Q"
deck1_level_up          = "j"
deck1_level_down        = "m"
deck1_level_max         = "space+j"
deck1_level_min         = "space+m"
deck1_filter_increase   = "7"
deck1_filter_decrease   = "u"
deck1_filter_reset      = ["space+7", "space+u"]
deck1_jump_forward_4b   = "1"
deck1_jump_backward_4b  = "q"
deck1_jump_forward_8b   = "2"
deck1_jump_backward_8b  = "w"
deck1_jump_forward_1bt  = "space+1"
deck1_jump_backward_1bt = "space+q"
deck1_jump_forward_4bt  = "space+2"
deck1_jump_backward_4bt = "space+w"
deck1_cue               = "space+a"
deck1_cue_play          = "A"

# Deck 2
deck2_play_pause        = "space+c"
deck2_open_browser      = "C"
deck2_bpm_tap           = "n"
deck2_metronome         = "N"
deck2_redetect_bpm      = "#"
deck2_tempo_reset       = "~"
deck2_bpm_increase      = "v"
deck2_bpm_decrease      = "f"
deck2_base_bpm_increase = "V"
deck2_base_bpm_decrease = "F"
deck2_nudge_forward     = "d"
deck2_nudge_backward    = "c"
deck2_offset_increase   = "£"
deck2_offset_decrease   = "E"
deck2_level_up          = "k"
deck2_level_down        = ","
deck2_level_max         = "space+k"
deck2_level_min         = "space+,"
deck2_filter_increase   = "i"
deck2_filter_decrease   = "8"
deck2_filter_reset      = ["space+i", "space+8"]
deck2_jump_forward_4b   = "3"
deck2_jump_backward_4b  = "e"
deck2_jump_forward_8b   = "4"
deck2_jump_backward_8b  = "r"
deck2_jump_forward_1bt  = "space+3"
deck2_jump_backward_1bt = "space+e"
deck2_jump_forward_4bt  = "space+4"
deck2_jump_backward_4bt = "space+r"
deck2_cue               = "space+d"
deck2_cue_play          = "D"

[display]
playhead_position = 20        # 0–100, percentage from left edge of detail panel
warning_threshold_secs = 30   # seconds before end to activate bar-marker flash warning
detail_height = 6             # total rows per detail waveform (including 2-row tick area; min 4)
