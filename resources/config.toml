[keys]
quit             = "esc"

# Global
zoom_in           = "-"
zoom_out          = "="
height_decrease   = "{"
height_increase   = "}"
latency_decrease  = "["
latency_increase  = "]"
palette_cycle     = "~"
vinyl_mode_toggle = "`"
art_cycle         = "/"
keyboard_help     = "space+/"
help              = "?"
nudge_mode_toggle = "¬"

# Deck select
select_deck1 = "space+1"
select_deck2 = "space+2"

# Transport / browse (selected deck)
play_pause   = "space+f"
open_browser = "space+d"

# Pitch (selected deck)
pitch_up    = "z"
pitch_down  = "a"
pitch_reset = ["space+a", "space+z"]

# BPM (selected deck)
bpm_tap          = "c"
redetect_bpm     = "space+c"
metronome_toggle = "space+b"
bpm_increase     = "b"
bpm_decrease     = "g"
base_bpm_increase = "B"
base_bpm_decrease = "G"

# Nudge (selected deck)
nudge_forward  = "f"
nudge_backward = "v"

# Tick offset (selected deck)
offset_increase = "F"
offset_decrease = "V"

# Cue (selected deck)
cue      = "space+e"
cue_play = "space+r"

# PFL (selected deck)
pfl_up     = "s"
pfl_down   = "x"
pfl_reset  = ["space+s", "space+x"]
pfl_on_off = "space+g"

# Beat jumps (selected deck)
jump_forward_1bt  = "1"
jump_backward_1bt = "q"
jump_forward_4bt  = "2"
jump_backward_4bt = "w"
jump_forward_4b   = "3"
jump_backward_4b  = "e"
jump_forward_8b   = "4"
jump_backward_8b  = "r"
jump_forward_16b  = "5"
jump_backward_16b = "t"
jump_forward_32b  = "$"
jump_backward_32b = "R"
jump_forward_64b  = "%"
jump_backward_64b = "T"

# Mixer — Deck 1
deck1_level_up          = "j"
deck1_level_down        = "m"
deck1_level_max         = "space+j"
deck1_level_min         = "space+m"
deck1_gain_increase     = "J"
deck1_gain_decrease     = "M"
deck1_filter_increase        = "7"
deck1_filter_decrease        = "u"
deck1_filter_reset           = ["space+7", "space+u"]
deck1_filter_slope_increase  = "&"
deck1_filter_slope_decrease  = "U"

# Mixer — Deck 2
deck2_level_up          = "k"
deck2_level_down        = ","
deck2_level_max         = "space+k"
deck2_level_min         = "space+,"
deck2_gain_increase     = "K"
deck2_gain_decrease     = "<"
deck2_filter_increase        = "8"
deck2_filter_decrease        = "i"
deck2_filter_reset           = ["space+8", "space+i"]
deck2_filter_slope_increase  = "*"
deck2_filter_slope_decrease  = "I"

[display]
playhead_position = 20        # 0–100, percentage from left edge of detail panel
warning_threshold_secs = 30   # seconds before end to activate bar-marker flash warning
detail_height = 6             # total rows per detail waveform (including 2-row tick area; min 4)
