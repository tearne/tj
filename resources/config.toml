[keys]
play_pause       = "space+z"
tempo_reset      = ["space+f", "space+v"]
quit             = "esc"
jump_forward_1   = "1"
jump_backward_1  = "q"
jump_forward_4   = "2"
jump_backward_4  = "w"
jump_forward_16  = "3"
jump_backward_16 = "e"
jump_forward_64  = "4"
jump_backward_64 = "r"
nudge_backward   = "c"
nudge_forward    = "d"
nudge_mode_toggle = ["C", "D"]
offset_increase  = "_"
offset_decrease  = "+"
zoom_in          = "-"
zoom_out         = "="
height_increase  = "}"
height_decrease  = "{"
deck_a_level_up  = "j"
deck_a_level_down = "m"
deck_a_level_max = "space+j"
deck_a_level_min = "space+m"
bpm_increase     = "f"
bpm_decrease     = "v"
base_bpm_increase = "F"
base_bpm_decrease = "V"
palette_cycle    = "p"
waveform_style   = "o"
open_browser     = "z"
bpm_tap          = "b"
metronome_toggle = "'"
redetect_bpm     = "@"
latency_decrease = "["
latency_increase = "]"
deck_a_filter_increase = "7"
deck_a_filter_decrease = "u"
filter_reset     = ["space+7", "space+u"]
terminal_refresh = "`"
help             = "?"
deck_select_a    = "g"
deck_select_b    = "h"
deck_a_hide      = "G"
deck_b_hide      = "H"
deck_b_level_up     = "k"
deck_b_level_down   = ","
deck_b_filter_increase = "i"
deck_b_filter_decrease = "8"

[display]
playhead_position = 20        # 0–100, percentage from left edge of detail panel
warning_threshold_secs = 30   # seconds before end to activate bar-marker flash warning
detail_height = 6             # total rows per detail waveform (including 2-row tick area; min 3)
